<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAD DAWG FILMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;400;700&family=Playfair+Display:ital,wght@0,400;0,900;1,900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #050505;
            --blood: #8a0303;
            --blood-bright: #c41010;
            --silver: #C0C0C0;
            --steel: #1a1a1a;
            --sidebar-w: 260px;
            --f-head: 'Oswald', sans-serif;
            --f-body: 'Playfair Display', serif;
            --f-tech: 'Share Tech Mono', monospace;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        body { background: var(--void); color: #fff; font-family: var(--f-body); overflow: hidden; height: 100vh; display: flex; }
        ::selection { background: var(--blood); color: #fff; }

        /* CURSOR */
        #cursor-bat { position: fixed; top: 0; left: 0; width: 64px; height: 64px; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%) rotate(-45deg); mix-blend-mode: exclusion; }
        .blood-drop { position: fixed; background: var(--blood-bright); border-radius: 50%; pointer-events: none; z-index: 9998; animation: dropFade 0.8s forwards; }
        @keyframes dropFade { 0%{transform:scale(1);opacity:.8} 100%{transform:scale(.1) translateY(40px);opacity:0} }

        /* SIDEBAR */
        .sidebar { width: var(--sidebar-w); height: 100vh; background: #000; border-right: 1px solid var(--steel); display: flex; flex-direction: column; justify-content: space-between; padding: 40px 0; position: relative; z-index: 100; flex-shrink: 0; }
        .sidebar::after { content:''; position:absolute; top:0; right:0; bottom:0; width:1px; background:linear-gradient(to bottom,transparent,var(--blood),transparent); opacity:.35; }
        .brand { text-align: center; margin-bottom: 50px; }
        .brand-logo { font-family: var(--f-head); font-size: 1.4rem; letter-spacing: 5px; color: var(--silver); border: 2px solid var(--silver); padding: 10px 14px; display: inline-block; }
        .nav { display: flex; flex-direction: column; gap: 4px; }
        .nav a { display:block; padding:14px 28px; color:#555; text-decoration:none; font-family:var(--f-head); text-transform:uppercase; letter-spacing:2px; font-size:.9rem; border-left:2px solid transparent; transition:all .3s; }
        .nav a:hover, .nav a.active { color:#fff; border-left-color:var(--blood); padding-left:36px; background:linear-gradient(90deg,rgba(138,3,3,.08),transparent); }
        .sidebar-foot { text-align:center; font-size:.65rem; color:#333; font-family:var(--f-tech); }

        /* MAIN */
        .main { flex:1; position:relative; display:flex; justify-content:center; align-items:center; background:radial-gradient(ellipse at 60% 40%,#110000 0%,#000 70%); overflow:hidden; }
        .grain { position:absolute; inset:0; background-image:url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIj48ZmlsdGVyIGlkPSJuIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC42NSIgbnVtT2N0YXZlcz0iMyIgc3RpdGNoVGlsZXM9InN0aXRjaCIvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIyMDAiIGhlaWdodD0iMjAwIiBmaWx0ZXI9InVybCgjbikiIG9wYWNpdHk9IjAuMDUiLz48L3N2Zz4='); opacity:.07; pointer-events:none; }
        .deco { position:absolute; background:var(--blood); opacity:.05; }
        .deco.h { width:100%; height:1px; }
        .deco.v { width:1px; height:100%; }

        .hero { text-align:center; z-index:10; }
        .hero-title { font-family:var(--f-head); font-size:clamp(5rem,12vw,9rem); line-height:.88; text-transform:uppercase; color:transparent; -webkit-text-stroke:2px var(--silver); animation:breathe 5s ease-in-out infinite; }
        .hero-title .films { display:block; color:#fff; -webkit-text-stroke:0; font-weight:200; font-size:.45em; letter-spacing:.35em; margin-top:8px; }
        .tagline { margin-top:28px; font-family:var(--f-tech); font-size:.8rem; letter-spacing:5px; color:var(--blood); text-transform:uppercase; }
        .tagline::before, .tagline::after { content:''; display:inline-block; width:35px; height:1px; background:var(--blood); vertical-align:middle; margin:0 14px; }

        @keyframes breathe { 0%,100%{opacity:.85} 50%{opacity:1;text-shadow:0 0 30px rgba(192,192,192,.12)} }

        @media(max-width:768px){
            body{flex-direction:column}
            .sidebar{width:100%;height:auto;flex-direction:row;align-items:center;padding:12px 20px;justify-content:space-between}
            .brand{margin-bottom:0}
            .nav{flex-direction:row;gap:0}
            .nav a{padding:8px 12px;font-size:.7rem;border-left:none;border-bottom:2px solid transparent}
            .nav a:hover,.nav a.active{padding-left:12px;border-bottom-color:var(--blood);border-left-color:transparent}
            .sidebar-foot{display:none}
        }
    </style>
</head>
<body>
    <svg id="cursor-bat" viewBox="0 0 100 100" fill="none">
        <rect x="45" y="70" width="10" height="25" fill="#5c4033" stroke="#fff" stroke-width="1.5"/>
        <path d="M40 70 L60 70 L60 20 C60 10 40 10 40 20 Z" fill="#C0C0C0" stroke="#fff" stroke-width="1.5"/>
        <path d="M42 25 Q45 30 48 22 Q50 35 55 28" stroke="#8a0303" stroke-width="3" opacity="0.8"/>
        <circle cx="50" cy="40" r="2.5" fill="#8a0303"/>
    </svg>

    <aside class="sidebar">
        <div>
            <div class="brand"><div class="brand-logo">MAD DAWG</div></div>
            <nav class="nav">
                <a href="index.html" class="active">Home</a>
                <a href="projects.html">Projects</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
        <div class="sidebar-foot">&copy; 2026 MAD DAWG FILMS</div>
    </aside>

    <main class="main">
        <div class="grain"></div>
        <div class="deco h" style="top:28%"></div>
        <div class="deco h" style="top:72%"></div>
        <div class="deco v" style="left:22%"></div>
        <div class="deco v" style="right:22%"></div>
        <div class="hero">
            <h1 class="hero-title">MAD<br>DAWG<span class="films">FILMS</span></h1>
            <p class="tagline">Pure Bangers Only</p>
        </div>
    </main>

    <script>
        const cursor = document.getElementById('cursor-bat');
        let mx=0,my=0,cx=0,cy=0,lastDrop=0;
        document.addEventListener('mousemove',e=>{
            mx=e.clientX; my=e.clientY;
            const now=Date.now(), spd=Math.abs(e.movementX)+Math.abs(e.movementY);
            if(spd>12&&now-lastDrop>60){
                const d=document.createElement('div'); d.className='blood-drop';
                const s=Math.random()*5+2;
                Object.assign(d.style,{left:e.clientX+'px',top:e.clientY+'px',width:s+'px',height:s+'px'});
                document.body.appendChild(d); lastDrop=now;
                setTimeout(()=>d.remove(),800);
            }
        });
        (function anim(){
            cx+=(mx-cx)*.14; cy+=(my-cy)*.14;
            cursor.style.left=cx+'px'; cursor.style.top=cy+'px';
            cursor.style.transform=`translate(-50%,-50%) rotate(${-45+(mx-cx)*.4}deg)`;
            requestAnimationFrame(anim);
        })();
    </script>
</body>
</html>
